baseURL: https://rueun.github.io/
title: Rueun's Blog
theme: hugo-book

disablePathToLower: true
paginate: 10

taxonomies:
  category: categories
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 1
  highlight:
    style: base16-snazzy
    lineNos: true
    lineNumbersInTable: true
    guessSyntax: true

menu:
  after:
    - name: "Github"
      url: "https://github.com/rueun"
      weight: 10
    - name: "Tags"
      url: "/tags/"
      weight: 20
    - name: "Categories"
      url: "/categories/"
      weight: 30

params:
  BookTheme: "light"
  BookToC: true
  BookSearch: true
  BookSection: docs
  BookDateFormat: "January 2, 2006"
  BookComments: false

  BookMenu:
    profileImage: "https://avatars.githubusercontent.com/u/64256409"
    githubLink: "https://github.com/rueun"
    recentPosts: true
