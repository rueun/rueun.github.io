<div class="sidebar-profile">
  <div class="profile-img-wrap">
    <a href="{{ cond (not .Site.Home.File) .Sites.Default.Home.RelPermalink .Site.Home.RelPermalink }}">
      <img src="{{ .Site.Params.BookMenu.profileImage }}" alt="Profile" class="profile-img" />
    </a>
  </div>
  <div class="sidebar-social">
    {{ with .Site.Params.BookMenu.githubLink }}
    <a href="{{ . }}" target="_blank" title="GitHub">
      <i class="fa-brands fa-github"></i>
    </a>
    {{ end }}
    {{ with .Site.Params.BookMenu.linkedinLink }}
    <a href="{{ . }}" target="_blank" title="LinkedIn">
      <i class="fa-brands fa-linkedin"></i>
    </a>
    {{ end }}
    {{ with .Site.Params.BookMenu.notionLink }}
    <a href="{{ . }}" target="_blank" title="Notion">
      <i class="fa-solid fa-n"></i>
    </a>
    {{ end }}
    {{ with .Site.Params.BookMenu.twitterLink }}
    <a href="{{ . }}" target="_blank" title="Twitter">
      <i class="fa-brands fa-x-twitter"></i>
    </a>
    {{ end }}
  </div>
</div>

<h2 class="book-brand">
  <a class="flex align-center" href="{{ cond (not .Site.Home.File) .Sites.Default.Home.RelPermalink .Site.Home.RelPermalink }}">
    {{- with .Site.Params.BookLogo -}}
    <img src="{{ . | relURL }}" alt="{{ partial "docs/text/i18n" "Logo" }}" />
    {{- end -}}
    <span>{{ .Site.Title }}</span>
  </a>
</h2>
